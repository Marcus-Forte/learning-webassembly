<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ vs JS WebAssembly Benchmark</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 960px; background: #1e1e1e; color: #ccc; }
        h1 { margin-bottom: 0.25rem; }
        .subtitle { color: #888; margin-bottom: 1.5rem; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .col-name { font-family: monospace; }

        button { padding: 0.35rem 0.9rem; font-size: 0.85rem; border: none; border-radius: 5px;
                 cursor: pointer; font-weight: 600; margin-right: 0.5rem; }
        .btn-js  { background: #f0db4f; color: #333; }
        .btn-cpp { background: #4a90d9; color: #fff; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .result { font-family: monospace; font-size: 0.9rem; min-width: 5rem; display: inline-block; color: #888; }
        .js-result  { color: #f0db4f; }
        .cpp-result { color: #4a90d9; }
        .btn-init { background: #555; color: #eee; }

        .label-cpp { color: #4a90d9; }
        input[type=number] { background: #2a2a2a; color: #ccc; border: 1px solid #555;
                             border-radius: 4px; padding: 0.25rem 0.4rem; font-size: 0.9rem; width: 9rem; }
    </style>
</head>
<body>
    <h1>C++ / WebAssembly vs JavaScript</h1>
    <p class="subtitle">Same input, two implementations. C++ compiled to WASM.</p>

    <table>
        <thead>
            <tr>
                <th>Benchmark</th>
                <th>Input</th>
                <th>JavaScript</th>
                <th>C++ / WASM</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="col-name">find_primes(N)</td>
                <td><input id="input-primes-n" type="number" value="10000000" min="2" max="500000000"></td>
                <td><button class="btn-js"  id="js-primes">▶ JS</button><span class="result js-result"  id="res-js-primes">—</span></td>
                <td><button class="btn-cpp" id="cpp-primes" disabled>▶ C++</button><span class="result cpp-result" id="res-cpp-primes">—</span></td>
            </tr>
            <tr>
                <td class="col-name">mat_mul(data, N)</td>
                <td>
                    <input id="input-matmul-n" type="number" value="256" min="1" max="2048">
                    <button class="btn-init" id="init-matmul">Init</button>
                </td>
                <td><button class="btn-js"  id="js-matmul" disabled>▶ JS</button><span class="result js-result"  id="res-js-matmul">—</span></td>
                <td><button class="btn-cpp" id="cpp-matmul" disabled>▶ C++</button><span class="result cpp-result" id="res-cpp-matmul">—</span></td>
            </tr>
            <tr>
                <td class="col-name">sort(data, size)</td>
                <td>
                    <input id="input-sort-n" type="number" value="1000000" min="1" max="50000000">
                    <button class="btn-init" id="init-sort">Init</button>
                </td>
                <td><button class="btn-js"  id="js-sort" disabled>▶ JS</button><span class="result js-result"  id="res-js-sort">—</span></td>
                <td><button class="btn-cpp" id="cpp-sort" disabled>▶ C++</button><span class="result cpp-result" id="res-cpp-sort">—</span></td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/mathjs/lib/browser/math.js"></script>
    <script src="bench_js.js"></script>
    <script src="bench_wasm_glue.js"></script>
    <script src="wasm/bench_wasm.js"></script>
</body>
</html>
